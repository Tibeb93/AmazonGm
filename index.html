<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Website</title>
    <link rel="stylesheet" href="css/style.css" />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <nav>
        <div class="nav-logo">
          <img src="images/amazon-logo.png" alt="Amazon Logo" />
        </div>
        <div class="nav-address">
          <div class="address-icon">
            <i class="fa-solid fa-location-dot"></i>
          </div>
          <div class="address-text">
            <p class="address-first">Deliver to</p>
            <p class="address-second">Ethiopia</p>
          </div>
        </div>
        <div class="nav-search">
          <div class="nav-search">
            <select id="dept" title="Department">
              <option>All Departments</option>
              <option>Arts & Crafts</option>
              <option>Automotive</option>
              <option>Baby</option>
              <option>Beauty & Personal Care</option>
              <option>Books</option>
              <option>Boys' Fashion</option>
              <option>Computers</option>
              <option>Deals</option>
              <option>Digital Music</option>
              <option>Electronics</option>
              <option>Girls' Fashion</option>
              <option>Health & Household</option>
              <option>Home & Kitchen</option>
              <option>Industrial & Scientific</option>
              <option>Kindle Store</option>
              <option>Luggage</option>
              <option>Men's Fashion</option>
              <option>Movies & TV</option>
              <option>Music, CDs & Vinyl</option>
              <option>Pet Supplies</option>
              <option>Prime Video</option>
              <option>Software</option>
              <option>Sports & Outdoors</option>
              <option>Tools & Home Improvement</option>
              <option>Toys & Games</option>
              <option>Video Games</option>
              <option>Women's Fashion</option>
            </select>

            <input type="text" placeholder="Search Amazon" />

            <button><i class="fa-solid fa-magnifying-glass"></i></button>
          </div>
        </div>
        <div class="nav-language">
          <img src="images/us-flag.png" alt="USA Flag" />

          <span>EN</span>

          <i class="fa-solid fa-caret-down"></i>
        </div>
        <div class="nav-signin">
          <p class="small-text">Hello, Sign in</p>

          <p class="large-text">Account & Lists</p>
        </div>
        <div class="nav-orders">
          <p class="small-text">Returns</p>

          <p class="large-text">& Orders</p>
        </div>
        <div class="nav-cart">
          <i class="fa-solid fa-cart-shopping"></i>

          <span>Cart</span>
        </div>
      </nav>
    </header>
    <link rel="stylesheet" href="css/style.css" />
  </body>
</html>
